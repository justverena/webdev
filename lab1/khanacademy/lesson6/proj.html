<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Project: Event Invite</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: rgb(240, 240, 240);
            color: rgb(0, 0, 0);
            margin: 20px;
            text-align: center;
        }

        h1 {
            color: rgb(51, 102, 255);
        }

        h2 {
            color: rgb(0, 102, 0);
        }

        p {
            font-size: 18px;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            font-style: italic;
            margin-bottom: 10px;
        }

        .invite-container {
            background-color: rgb(255, 255, 255);
            border-radius: 10px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

    </style>
</head>
<body>

    <div class="invite-container">
        <h1>You're Invited!</h1>
        <h2>To Something Special</h2>

        <p>The Details:</p>
        <ul>
            <li>Date: March 1, 2024</li>
            <li>Time: 7:00 PM</li>
            <li>Location: XYZ Venue</li>
        </ul>

    </div>

</body>
</html>
